{% extends "base.html" %}

{% block title %}Login - HealthGuard{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="form-container">
        <div class="auth-header">
            <h2>🔐 Welcome Back</h2>
            <p>Sign in to access your health dashboard</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <input type="text" id="username" name="username" required
                       value="{{ request.form.username if request.form.username else '' }}"
                       placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" required
                       placeholder="Enter your password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </div>
        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one here</a></p>
        </div>

        <div class="auth-features">
            <div class="feature-item">
                <i class="fas fa-shield-alt"></i>
                <span>Secure & Private</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-brain"></i>
                <span>AI-Powered</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-chart-line"></i>
                <span>Track Progress</span>
            </div>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 40px 20px;
    background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
}

.form-container {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-radius: var(--border-radius-xl);
    padding: 50px;
    box-shadow: var(--shadow-xl);
    border: 1px solid rgba(255, 255, 255, 0.2);
    max-width: 450px;
    width: 100%;
    animation: fadeInUp 0.6s ease-out;
}

.auth-header {
    text-align: center;
    margin-bottom: 40px;
}

.auth-header h2 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
}

.auth-header p {
    color: var(--gray-600);
    font-size: 1.1rem;
}

.auth-form {
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 25px;
    animation: slideInLeft 0.6s ease-out;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--gray-700);
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.form-group input {
    width: 100%;
    padding: 16px 20px;
    border: 2px solid var(--gray-200);
    border-radius: var(--border-radius);
    font-size: 1rem;
    transition: var(--transition);
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
}

.form-group input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    background: white;
}

.form-group input::placeholder {
    color: var(--gray-400);
}

.btn-full {
    width: 100%;
    padding: 16px;
    font-size: 1.1rem;
    margin: 0;
}

.auth-links {
    text-align: center;
    margin-bottom: 30px;
}

.auth-links p {
    color: var(--gray-600);
    margin: 0;
}

.auth-links a {
    color: var(--primary-color);
    text-decoration: none;
    font-weight: 600;
    transition: var(--transition);
}

.auth-links a:hover {
    color: var(--secondary-color);
}

.auth-features {
    display: flex;
    justify-content: space-around;
    padding-top: 30px;
    border-top: 1px solid var(--gray-200);
}

.feature-item {
    text-align: center;
    color: var(--gray-600);
}

.feature-item i {
    font-size: 1.5rem;
    color: var(--primary-color);
    display: block;
    margin-bottom: 5px;
}

.feature-item span {
    font-size: 0.85rem;
    font-weight: 500;
}

@media (max-width: 480px) {
    .form-container {
        padding: 30px 25px;
        margin: 20px;
    }

    .auth-header h2 {
        font-size: 1.8rem;
    }

    .auth-features {
        flex-direction: column;
        gap: 15px;
    }
}
</style>
{% endblock %}
